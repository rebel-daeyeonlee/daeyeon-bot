# daeyeon-bot — example configuration.
#
# Copy to `config.toml` (gitignored) and edit. The path can be overridden with
# DAEYEON_BOT_CONFIG. All keys here are also overridable via env using the
# `DAEYEON_BOT__SECTION__KEY` pattern (double underscore as section separator).

[runtime]
# Where state.db, PAUSE flag, heartbeat file, and *.bak backups live.
# Tilde is expanded at load time.
state_dir = "~/.daeyeon-bot"
# 2-phase shutdown total budget (seconds). Phase A drain + Phase B finalize.
shutdown_budget_seconds = 180

[logging]
level = "INFO"        # DEBUG | INFO | WARNING | ERROR
format = "json"       # "json" for production, "console" for dev tail

[retention]
events_days = 90
runs_days = 30
runs_keep_per_handler = 10
dedup_default_ttl_days = 7
backup_keep = 5
# How long dormant gh_review_requested_state rows live before prune.
gh_state_dormant_days = 90
# How long dormant jira_assigned_state rows (in_pending_set=0) live before prune.
jira_state_dormant_days = 180

[ratelimit]
# Token-bucket gate the dispatcher consults before each claim. Capacity
# is burst budget; refill is the steady-state rate. Defaults are a soft
# 60/min cap with full-minute burst headroom — see migration 003.
# Bumping refill above poll rate (default ~2 polls/s) means the bucket
# never drains during idle polling; lowering it lets idle polling impose
# a softer per-minute floor.
claude_call_capacity = 60.0
claude_call_refill_per_sec = 1.0

[ratelimit.defaults]
global_per_hour = 30
global_per_day = 200
handler_per_hour = 10

[secrets]
# Provider for the Claude OAuth token.
#   "keychain" — macOS Keychain (default for Mac).
#   "file"     — 0600 file at `file_path` (default for Linux server).
#   "env"      — read CLAUDE_CODE_OAUTH_TOKEN from environment. **DEV ONLY**;
#                daemon requires `--insecure-env` flag to use this.
provider = "keychain"
keychain_service = "daeyeon-bot"
keychain_account = "oauth_token"
file_path = "/etc/daeyeon-bot/oauth_token"

[claude]
model = "claude-opus-4-7"
default_system_prompt = "You are daeyeon's helpful assistant."

[github]
# Operator's GitHub username. Resolved at boot via `gh api user` if absent.
# Used for the self-authored skip and as the search-query subject.
username = ""
# Per-call timeout for `gh api` invocations (seconds).
gh_call_timeout_seconds = 30

[jira]
# Atlassian Cloud host (single-tenant — Rebellions).
base_url = "https://rbln.atlassian.net/"
# Optional override for the discovered regression-failure issuetype name.
# Leave empty for autodiscovery against {"TC Failure", "Bug"} in that order.
issuetype_override = ""
# Per-call timeout for httpx (seconds).
timeout_seconds = 30

[loki]
# SSW cluster-internal Loki — no auth.
base_url = "http://loki.ssw.rbln.in"
# Per-stream byte cap; longer slices get truncated client-side.
per_stream_max_bytes = 1048576
# Per-request timeout for httpx (seconds).
timeout_seconds = 30
# Loki kernel/syslog label-schema templates. {host} is substituted with the
# hostname-by-name at query time. Default schema is `hostname` + `logtype`
# (canonical SSW Loki shape — see ssw-debugger log-analysis SKILL.md).
# Override only if your fleet exports under a different label scheme.
kernel_query_template = '{hostname="{host}", logtype="kernel"}'
syslog_query_template = '{hostname="{host}", logtype="syslog"}'
# rsmd [cdp] FW console dumps land in syslog with a known ~9h timestamp
# shift (Alloy mis-parses RFC 3164 as KST). The syslog query window is
# widened by this many extra hours on each side to recover them.
syslog_window_extra_hours = 12

[slack]
# Slack Web API. The bot token is a SECRET (key `slack_bot_token`, env
# `SLACK_BOT_TOKEN`) — NOT here. Used by feature 003 (ci_triage / slack_ci_alert).
api_base = "https://slack.com/api"
timeout_seconds = 20

[oncall_wiki]
# Read-only clone of the OnCall LLM Wiki (feature 003). Never touches the
# operator's working vault (~/ssw-devops-oncall) regardless of allow_external.
remote_url = "git@github.com:rebellions-sw/ssw-devops-oncall.git"
clone_path = "var/ssw-devops-oncall"
allow_external = false
# Managed 0600 known_hosts file (under state_dir); accept-new on first contact.
known_hosts_path = "oncall_wiki_known_hosts"

# ─── Triggers ──────────────────────────────────────────────────────────────────
# A trigger is enabled if its section exists with `enabled = true`.

[triggers.manual]
enabled = true

[triggers.gh_review_requested]
enabled = true
poll_interval_seconds = 300

[triggers.jira_assigned]
# Default off — flip in local config.toml to start polling.
enabled = false
poll_interval_seconds = 300              # 5 min
max_per_cycle = 200                      # safety cap per cycle
# Also match tickets assigned to this Jira Atlassian Team. Empty string
# disables team match (assignee-only mode).
team_name = "DevOps"

[triggers.slack_ci_alert]
# CI Monitor polling trigger (feature 003 P2). Polls the two SSW DevOps
# on-call Slack channels for CI-failure alerts. Default off.
enabled = false
# #ssw-devops-alerts, #ssw-devops-help.
channels = ["C09SEN8MH5M", "C0A406KREHF"]
poll_interval_seconds = 120
# Per-channel per-cycle emit cap (bounds backlog fan-out after an outage).
max_per_cycle = 20
# Gap > this many seconds ⇒ re-seed the cursor instead of back-filling stale
# runs after a long outage / laptop sleep / pause (6 h default).
staleness_seconds = 21600

# ─── Handlers ──────────────────────────────────────────────────────────────────
# Manifest fields here override the handler's compile-time defaults.

[handlers.echo]
enabled = true
idempotent = true
dedup_ttl_seconds = 86400
concurrency = 1
accepts = ["manual.message"]

[handlers.pr_review]
enabled = true
idempotent = true
dedup_ttl_seconds = 86400
# `concurrency = 2` lets the second PR's `gh` prep work overlap with the
# first PR's Claude wait — useful for batches (e.g. 5 PRs queued after PTO).
# The Claude SDK itself is single-concurrent per session, so the wins come
# from `gh pr_get`/`pr_files` and SQLite I/O. Trade-off: doubles per-cycle
# `gh` traffic on your shared 5000/hr quota. Default 1 is the safe rollout.
concurrency = 1
accepts = ["gh.review_requested", "pr.review.manual"]
# Active persona (skill directory name under <skills_root>/<name>/SKILL.md).
# `daeyeon-bot-code-review` ships in this repo at .claude/skills/ and is the
# default `skills_root`, so no extra setup is needed.
persona_skill = "daeyeon-bot-code-review"
# Minimum body length after frontmatter strip; below this, persona is invalid.
min_persona_chars = 200
# Optional override for where to look for `<persona_skill>/SKILL.md`.
# Default: the repo-bundled `.claude/skills/` next to the daeyeon_bot package.
# Set to "~/.claude/skills" if you keep your personas in the standard
# Claude Code skills directory, or any absolute path you prefer.
# skills_root = "~/.claude/skills"

# Repo allowlist (SECURITY BOUNDARY — empty list = no filter, legacy behavior).
# Each entry is a `fnmatch` glob over `owner/name`. Match is case-insensitive.
# Enforced in two layers: (1) the trigger narrows its GitHub search query to
# the same set when expressible (`user:owner` / `repo:owner/name`), reducing
# poll traffic; (2) the handler re-checks every event before any `gh.pr_get`,
# so manual CLI events and unexpressible globs (e.g. `*foo*`) still get gated.
# Multi-owner allowlists (entries spanning ≥2 owners, e.g. `["a/*", "b/*"]`)
# also fall through to handler-only gating — GitHub Search rejects OR-ed
# `user:`/`repo:` qualifiers, so the trigger can't narrow such queries.
# `force = true` does NOT bypass this — it is a security boundary, not a
# quality knob. A blocked PR yields `audit.status = skipped_disallowed_repo`.
# Examples:
#   allowed_repos = ["rebellions-sw/*"]                          # whole org
#   allowed_repos = ["rebellions-sw/daeyeon-bot",                # specific repos
#                    "rebellions-sw/another-repo"]
#   allowed_repos = ["rebellions-sw/*", "octo/cat"]              # mixed
allowed_repos = []

# Review the operator's OWN open PRs too (default false → own PRs are skipped
# with audit.status = skipped_self_authored). When true, the trigger adds an
# `author:<operator>` search and self-authored PRs flow through the same state
# machine + handler, posted as GitHub COMMENT reviews (GitHub rejects a
# self-APPROVE with HTTP 422, so an APPROVE verdict is downgraded to COMMENT).
# Pair with a non-empty `allowed_repos` — with the empty allowlist above this
# scoops up every open PR you have across all of GitHub.
review_self = false

[handlers.pr_review.size_budget]
max_lines = 1000      # additions + deletions across all changed files
max_files = 50        # changed-file count

[handlers.jira_triage]
# Default off — flip in local config.toml after authoring the persona +
# storing JIRA_USER / JIRA_API_TOKEN / SSW_AUTOMATION_PASSWORD secrets.
enabled = false
idempotent = true
dedup_ttl_seconds = 86400
concurrency = 1
accepts = ["jira.assigned", "jira.triage.manual"]
# Allowed Jira project keys. Empty list = no auto-trigger ever fires
# (defense in depth). SSWCI is the v1 target.
allowed_projects = ["SSWCI"]
# Persona (skill directory name under <skills_root>/<name>/SKILL.md).
# `daeyeon-bot-jira-triage` ships with this repo under .claude/skills/.
persona_skill = "daeyeon-bot-jira-triage"
min_persona_chars = 200
# Per-event wall-clock budget covering all stages (Jira fetch, ssw-bundle
# checkout, Loki query, SSH fetch, Claude call, comment post). Two timeouts
# in a row → DeadLetter.
timeout_seconds = 600
# Project-root-relative path for the bot's dedicated ssw-bundle clone.
# Absolute paths also accepted. The bot refuses to operate on the operator's
# working tree (~/ssw-bundle) regardless of this setting.
ssw_bundle_path = "var/ssw-bundle"
# Safety guard. Set true ONLY if you knowingly point ssw_bundle_path outside
# the project root. Never enable casually.
allow_external_ssw_bundle = false
# SSH known-hosts file (under state_dir). Policy is `accept-new` on first
# contact; subsequent contacts verify strictly. File mode is enforced 0600.
ssh_known_hosts_path = "jira_triage_known_hosts"
# Per-file size cap when fetching from the SSH log dump.
ssh_max_file_bytes = 10485760           # 10 MB
# Files to fetch from <run-dir>/. Missing files are silently skipped.
ssh_fetch_globs = ["output.xml", "dmesg.log", "console.log"]
# Custom-field IDs override (leave empty for autodiscovery against field
# names "Branch", "Commit", "Team" via getJiraIssueTypeMetaWithFields).
branch_field_id = ""
commit_field_id = ""
team_field_id = ""

[handlers.ci_triage]
# CI Monitor / OnCall triage bot (feature 003). Default off — flip after
# storing the SLACK_BOT_TOKEN secret + authoring/confirming the persona.
# Requires [loki] present (device-level dual-evidence path) and a reachable
# [oncall_wiki] remote. Both are validated at boot when enabled.
enabled = false
idempotent = true
dedup_ttl_seconds = 86400
concurrency = 1                          # load-bearing — see handler MANIFEST note
accepts = ["slack.ci_alert", "ci.triage.manual"]
persona_skill = "daeyeon-bot-ci-triage"
min_persona_chars = 200
timeout_seconds = 600
# PoC test channel for one-way posting; part of the post allowlist. Set to a
# real channel id before enabling. While post_target = "dry_run", triage posts
# here only (never the real on-call channels).
dry_run_channel = "C0XXXXXXXXX"
# "dry_run" → post to dry_run_channel; "thread" → reply in the alert thread.
# Promote to "thread" only after reviewing dry_run audit rows (see RUNBOOK P3).
post_target = "dry_run"
# Post a minimal "bot saw it; no machine-readable run/Loki link" note when there
# is no evidence. Flipped to true together with post_target=thread at promotion.
post_no_evidence_note = false
# P1 cross-run comparison: list recent runs of the same workflow to evidence
# infra_env vs product_regression ("다른 PR도 fail?"). Best-effort — a gh failure
# degrades to "no comparison" and never fails the triage.
cross_run_enabled = true
cross_run_window = 30
# Optional: absolute path to ssw-debugger (oh-my-debugger) `dmesg-timeline.py`.
# When set + present, the device-log Loki slice is piped through it for a
# domain-distribution signal that sharpens owner_area. Empty → disabled. e.g.
# ".../ssw-debugger/.claude-plugin/plugin/skills/common/scripts/dmesg-timeline.py"
dmesg_timeline_script = ""
# P2 recurrence ("🔁 7일 N회") — audit-only, no secrets needed.
recurrence_enabled = true
recurrence_window_days = 7
# P2/P4 ticket search — surfaces open SSWCI/SDOC (Jira) + DOLIN (Linear) issues
# matching the host/signature. Opt-in: needs jira_user / jira_api_token and
# linear_api_token secrets (a missing one just disables that source). Off by
# default so boot never depends on them.
ticket_search_enabled = false
ticket_jira_projects = ["SSWCI", "SDOC"]
# P3 log-only triage: triage a pasted failure log (fenced ``` + error signature)
# when there's no run link / Loki window. P4 ticket-draft: suggest a SSWCI bug
# stub for a confident infra_env failure with no matching open ticket.
log_only_triage_enabled = true
ticket_draft_enabled = true

# ─── Routing ───────────────────────────────────────────────────────────────────
# event.type → list of handler names. A type with no entry is dropped (logged).

[routing]
"manual.message" = ["echo"]
"gh.review_requested" = ["pr_review"]
"pr.review.manual"    = ["pr_review"]
"jira.assigned"       = ["jira_triage"]
"jira.triage.manual"  = ["jira_triage"]
"slack.ci_alert"      = ["ci_triage"]
"ci.triage.manual"    = ["ci_triage"]
